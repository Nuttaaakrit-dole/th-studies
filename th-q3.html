<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบ N-NET ภาษาไทย ประถมศึกษา (ชุดที่ 3)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0284c7; --primary-dark: #0c4a6e; --primary-light: #f0f9ff;
    --green: #166534; --green-light: #f0fdf4;
    --red: #991b1b; --red-light: #fef2f2;
    --gray-bg: #f8fafc; --gray-card: #ffffff; --gray-border: #e2e8f0;
    --text: #0f172a; --text-muted: #475569;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); padding-bottom: 60px; }
  .container { max-width: 680px; margin: 0 auto; padding: 16px; }
  
  .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 16px; padding: 24px; color: #fff; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(2,132,199,0.15); }
  .badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .title { font-size: 22px; font-weight: 700; margin-bottom: 5px; line-height: 1.4; }
  .subtitle { font-size: 14px; opacity: 0.9; }

  .card { background: var(--gray-card); border-radius: 16px; padding: 24px; border: 1px solid var(--gray-border); margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
  
  .inp-group { margin-bottom: 16px; text-align: left; }
  .inp-label { display: block; font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .inp-text { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--gray-border); font-family: 'Sarabun', sans-serif; font-size: 16px; background: #fdfdfd; }
  
  .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
  .btn-secondary { background: #e2e8f0; color: var(--text); width: 48%; }
  
  .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
  .nav-buttons .btn-primary { width: 48%; }

  .prog-text { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .prog-bar { background: #e2e8f0; height: 10px; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .prog-fill { background: var(--primary); height: 100%; width: 0%; transition: 0.3s; }

  .q-badge { font-size: 12px; color: var(--primary-dark); background: var(--primary-light); display: inline-block; padding: 4px 10px; border-radius: 6px; font-weight: 700; margin-bottom: 12px; }
  .q-text { font-size: 17px; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }

  .choices { display: flex; flex-direction: column; gap: 12px; }
  .choice { display: flex; align-items: center; background: #fff; border: 2px solid var(--gray-border); padding: 14px 16px; border-radius: 12px; cursor: pointer; font-size: 15px; font-family: 'Sarabun', sans-serif; text-align: left; transition: 0.2s; width: 100%; min-height: 60px; }
  
  .choice.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
  .choice.correct { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 600; }
  .choice.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); font-weight: 600; }
  
  .c-let { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 50%; margin-right: 15px; font-weight: 700; font-size: 14px; flex-shrink: 0; color: var(--text-muted); }
  .choice.selected .c-let { background: var(--primary); color: #fff; }
  .choice.correct .c-let { background: var(--green); color: #fff; }
  .choice.wrong .c-let { background: var(--red); color: #fff; }

  .feedback { padding: 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; margin-top: 16px; }
  .feedback.ok { background: var(--green-light); border: 1px solid var(--green); color: var(--green); }
  .feedback.no { background: var(--red-light); border: 1px solid var(--red); color: var(--red); }
  .fb-explain { font-size: 13px; color: #334155; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; margin-top: 10px; display: block; border-left: 3px solid var(--text-muted); }
  
  .analysis-card { background: #ffffff; border: 1px solid var(--gray-border); border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  .analysis-header { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .analysis-item { background: #f8fafc; padding: 12px 16px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #cbd5e1; }
  .analysis-item.weak { border-left-color: var(--red); background: #fff5f5; }
  .analysis-item.good { border-left-color: var(--green); background: #f6fdf9; }
  .analysis-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
  .analysis-tag.weak { background: var(--red-light); color: var(--red); }
  .analysis-tag.good { background: var(--green-light); color: var(--green); }

  .grid-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
  .stat-box { background: #f8fafc; padding: 16px 10px; border-radius: 12px; text-align: center; border: 1px solid var(--gray-border); }
  .stat-num { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.blue { color: var(--primary); }
  
  .review-item { padding: 16px 0; border-bottom: 1px solid var(--gray-border); text-align: left; }
  .review-item:last-child { border-bottom: none; }
  .r-q { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .r-a { font-size: 14px; margin-bottom: 4px; }
  .ri-tick { display: inline-block; width: 20px; font-weight: bold; margin-right: 5px; }
  .ri-tick.ok { color: var(--green); }
  .ri-tick.no { color: var(--red); }

  .dot-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; justify-content: center; }
  .dot { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--gray-border); font-family: 'Sarabun'; font-weight: 600; font-size: 12px; cursor: pointer; background: #fff; color: var(--text); }
  .dot.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .dot.ok { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .dot.no { background: var(--red-light); color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">N-NET • สกร.โนนสัง ประถมศึกษา (ชุดที่ 3)</div>
    <div class="title">🇹🇭 แบบทดสอบวิชาภาษาไทย (ระดับประยุกต์ใช้/คิดวิเคราะห์)</div>

  </div>
  
  <div id="app"></div>
</div>

let state = {
  screen: 'login', studentName: '', studentId: '', questions: [], answers: [], checked: [], current: 0
};

function shuffleArray(arr) {
  let newArr = arr.slice();
  for (let i = newArr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

function startApp() {
  const nameInput = document.getElementById('s_name').value;
  const idInput = document.getElementById('s_id').value;
  if (!nameInput.trim()) { alert('กรุณากรอกชื่อ-นามสกุลก่อนเข้าสอบครับ'); return; }
  
  state.studentName = nameInput;
  state.studentId = idInput || 'สกร. ระดับประถมศึกษา';
  document.getElementById('subtitle-text').innerText = 'ผู้เข้าสอบ: ' + state.studentName;
  
  let shuffledDB = shuffleArray(database);
  state.questions = [];
  
  for (let i = 0; i < shuffledDB.length; i++) {
    let q = shuffledDB[i];
    let correctText = q.choices[q.a];
    let newChoices = shuffleArray(q.choices);
    let newCorrectIndex = newChoices.indexOf(correctText);
    
    state.questions.push({
      cat: q.cat, q: q.q, exp: q.exp, choices: newChoices, correctAnswer: newCorrectIndex
    });
  }
  
  state.answers = new Array(state.questions.length).fill(null);
  state.checked = new Array(state.questions.length).fill(false);
  state.current = 0;
  state.screen = 'quiz';
  renderApp();
}

    app.innerHTML = `

        <div style="font-size: 60px; margin-bottom: 10px;">🇹🇭</div>
        <h2 style="color: var(--primary-dark); margin-bottom: 10px;">ระบบประเมินสมรรถนะ N-NET ภาษาไทย ประถมศึกษา (ชุดที่ 3)</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">เน้นการคิดวิเคราะห์ประยุกต์ใช้ คัดกรองตัวลวงวิชาการ และการแก้ไขปัญหาในชีวิตประจำวัน 20 ข้อ</p>
        <div class="inp-group">
          <label class="inp-label">ชื่อ-นามสกุลผู้เข้าสอบ</label>
          <input type="text" id="s_name" class="inp-text" placeholder="พิมพ์ชื่อและนามสกุลของคุณที่นี่">
        </div>
        <div class="inp-group">
          <label class="inp-label">ระดับชั้น / สังกัด สกร.</label>
          <input type="text" id="s_id" class="inp-text" value="ระดับประถมศึกษา - แบบทดสอบชุดที่ 3">
        </div>
        <button class="btn btn-primary" style="margin-top: 10px;" onclick="startApp()">เริ่มทำแบบทดสอบภาษาไทย 🚀</button>
      </div>
    `;
  } 
  else if (state.screen === 'quiz') {
    let total = state.questions.length;
    let curr = state.current;
    let q = state.questions[curr];
    let ans = state.answers[curr];
    let isChecked = state.checked[curr];
    let pct = Math.round(((curr + 1) / total) * 100);
    
    let letters = ['๑', '๒', '๓', '๔'];
    let choicesHTML = '';
    
    for (let i = 0; i < 4; i++) {
      let cssClass = 'choice';
      if (isChecked) {
        if (i === q.correctAnswer) cssClass += ' correct';
        else if (i === ans && ans !== q.correctAnswer) cssClass += ' wrong';
      } else {
        if (i === ans) cssClass += ' selected';
      }
      choicesHTML += `<button class="${cssClass}" ${isChecked ? 'disabled' : ''} onclick="selectAnswer(${i})">
                        <div class="c-let">${letters[i]}</div>
                        <div>${q.choices[i]}</div>
                      </button>`;
    }
    
    let fbHTML = isChecked ? (
      ans === q.correctAnswer 
        ? `<div class="feedback ok">✅ <strong>ยอดเยี่ยม! คำตอบถูกต้อง</strong><div class="fb-explain">💡 <strong>บทวิเคราะห์แนวคิด:</strong> ${q.exp}</div></div>`
        : `<div class="feedback no">❌ <strong>คำตอบยังไม่ถูกต้องครับ</strong> — พิจารณาข้อเฉลยที่เป็นแถบสีเขียวประกอบ<div class="fb-explain">💡 <strong>หลักเกณฑ์วิชาการ:</strong> ${q.exp}</div></div>`
    ) : '';
    
    let btnPrev = curr > 0 ? `<button class="btn btn-secondary" onclick="goPrev()">← ข้อก่อนหน้า</button>` : `<div style="width:48%"></div>`;
    let btnNext = isChecked ? (
      curr === total - 1 ? `<button class="btn btn-primary" onclick="showResult()">ส่งกระดาษคำตอบและวิเคราะห์ผล 🏆</button>` : `<button class="btn btn-primary" onclick="goNext()">ข้อถัดไป →</button>`
    ) : `<button class="btn btn-primary" ${ans === null ? 'disabled' : ''} onclick="checkAnswer()">ส่งตรวจคำตอบ ✓</button>`;
    
    let dotsHTML = '<div class="dot-nav">';
    for (let i = 0; i < total; i++) {
      let dClass = 'dot';
      if (i === curr) dClass += ' active';
      else if (state.checked[i]) dClass += (state.answers[i] === state.questions[i].correctAnswer) ? ' ok' : ' no';
      dotsHTML += `<button class="${dClass}" onclick="jumpTo(${i})">${i+1}</button>`;
    }
    dotsHTML += '</div>';

    app.innerHTML = `
      <div class="card" style="padding: 16px 20px;">
        <div class="prog-text"><span>ข้อที่ ${curr + 1} จาก ${total}</span><span>ความคืบหน้า ${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width: ${pct}%"></div></div>
      </div>
      <div class="card">
        <div class="q-badge">หมวดทักษะ: ${q.cat}</div>
        <div class="q-text">${q.q}</div>
        <div class="choices">${choicesHTML}</div>
        ${fbHTML}
        <div class="nav-buttons">${btnPrev}${btnNext}</div>
      </div>
      ${dotsHTML}
    `;
  }
  else if (state.screen === 'result') {
    let total = state.questions.length;
    let score = 0;
    let catStats = {};
    
    for (let i = 0; i < total; i++) {
      let q = state.questions[i];
      if (!catStats[q.cat]) catStats[q.cat] = { total: 0, correct: 0 };
      catStats[q.cat].total++;
      if (state.answers[i] === q.correctAnswer) { score++; catStats[q.cat].correct++; }
    }
    
    let pct = Math.round((score / total) * 100);
    
    let analysisHTML = '';
    for (let cat in catStats) {
      let cPct = Math.round((catStats[cat].correct / catStats[cat].total) * 100);
      let isWeak = cPct < 60;
      let tagClass = isWeak ? 'weak' : 'good';
      let tagText = isWeak ? '⚠️ ควรเร่งพัฒนาจุดสับสนเพิ่ม' : '✅ บรรลุเกณฑ์สมรรถนะการคิดวิเคราะห์';
      
      let advice = '';
      if(cat === "การอ่านจับใจความและวิเคราะห์ข้อเท็จจริง") advice = isWeak ? 'ยังมีจุดสับสนระหว่างข้อเท็จจริงกับข้อคิดเห็น รวมถึงเงื่อนไขของประกาศโฆษณา แนะนำให้อ่านอย่างรอบคอบและตัดช้อยส์ที่คิดไปเองออก' : 'ยอดเยี่ยมมาก! สามารถแยกแยะความจริง ความเห็น และตีความคู่มือหรือป้ายเตือนในชุมชนได้อย่างมีวิจารณญาณ';
      else if(cat === "หลักการใช้ภาษาไทยและการสะกดคำ") advice = isWeak ? 'มักพลาดตรงจุดคำศัพท์ที่เขียนผิดบ่อย ลักษณนาม และระดับของคำสรรพนาม แนะนำให้ทบทวนมาตราตัวสะกดและการจับคู่ลักษณนามทั่วไป' : 'ดีเยี่ยม! มีโครงสร้างและความแม่นยำด้านหลักภาษาไทยดี เลือกใช้คำสรรพนามได้ถูกต้องตามกาลเทศะบุคคล';
      else if(cat === "สำนวน สุภาษิต และคำพังเพย") advice = isWeak ? 'สับสนระหว่างความหมายเชิงลึกของสำนวนไทย แนะนำให้เชื่อมโยงพฤติกรรมในชีวิตประจำวันเข้ากับคำสอนของสุภาษิตให้มากขึ้น' : 'เก่งมาก! เข้าใจบริบทและคุณค่าของถ้อยคำสำนวนไทย สามารถนำไปเปรียบเปรยและประยุกต์ใช้สอนตนเองและผู้อื่นได้อย่างดี';
      else if(cat === "การเขียนและการสื่อสารในชีวิตประจำวัน") advice = isWeak ? 'ยังมีข้อบกพร่องในเรื่องภาษาจดหมายทางการ ความปลอดภัยของข้อมูลส่วนตัว และศิลปะการปฏิเสธอย่างสุภาพรักษาน้ำใจ' : 'โดดเด่นมาก! มีทักษะการสื่อสารทางสังคมที่ดี รู้จักปกป้องข้อมูลส่วนตัวจากการหลอกลวง และใช้ระดับภาษากิจธุระได้ถูกต้อง';

      analysisHTML += `
        <div class="analysis-item ${isWeak ? 'weak' : 'good'}">
          <span class="analysis-tag ${tagClass}">${tagText}</span>
          <div style="font-weight: 700; font-size: 15px; margin-bottom: 2px;">ด้าน: ${cat}</div>
          <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 6px;">ทำได้สุทธิ ${catStats[cat].correct} จาก ${catStats[cat].total} ข้อ (${cPct}%)</div>
          <div style="font-size: 13px; line-height:1.4;">💡 <strong>ข้อแนะนำพัฒนาผู้เรียน:</strong> ${advice}</div>
        </div>
      `;
    }

    let reviewHTML = '<div class="card" style="margin-top:20px"><div style="font-weight:700; margin-bottom:12px;">📋 สรุปรายการวิเคราะห์คำตอบแบบรายข้ออย่างละเอียด</div>';
    for (let i = 0; i < total; i++) {
      let q = state.questions[i];
      let isCorr = (state.answers[i] === q.correctAnswer);
      reviewHTML += `
        <div class="review-item">
          <div class="r-q"><span class="ri-tick ${isCorr?'ok':'no'}">${isCorr?'✓':'✗'}</span> ข้อที่ ${i+1}: ${q.q}</div>
          <div class="r-a" style="color:var(--text-muted)">คำตอบของคุณ: ${state.answers[i] !== null ? q.choices[state.answers[i]] : 'ไม่ได้เลือกคำตอบ'}</div>
          <div class="r-a" style="color:var(--green); font-weight:600;">คำตอบที่ถูกต้องตามหลักภาษา: ${q.choices[q.correctAnswer]}</div>
        </div>
      `;
    }
    reviewHTML += '</div>';

    app.innerHTML = `
      <div class="card" style="text-align:center; padding:32px 20px;">
        <h3 style="color:var(--primary-dark); margin-bottom:6px;">รายงานผลสอบประเมินสมรรถนะปลายภาค N-NET ภาษาไทย</h3>
        <div style="font-size:18px; font-weight:700;">คุณ ${state.studentName}</div>
        <div style="font-size:13px; color:var(--text-muted); margin-bottom:24px;">สังกัดการประเมิน: ${state.studentId}</div>
        
        <div style="font-size:56px; font-weight:800; color:var(--primary-dark); line-height:1;">${score}</div>
        <div style="font-size:14px; color:var(--text-muted); margin-bottom:20px;">คะแนนที่ทำได้ (จากข้อสอบทั้งหมด ${total} ข้อ)</div>
        
        <div class="grid-stats">
          <div class="stat-box"><div class="stat-num green">${score}</div><div style="font-size:12px;color:var(--text-muted)">ตอบถูก (ข้อ)</div></div>
          <div class="stat-box"><div class="stat-num red">${total - score}</div><div style="font-size:12px;color:var(--text-muted)">ตอบผิด (ข้อ)</div></div>
          <div class="stat-box"><div class="stat-num blue">${pct}%</div><div style="font-size:12px;color:var(--text-muted)">ความแม่นยำรวม</div></div>
        </div>
      </div>

      <div class="analysis-card">
        <div class="analysis-header">📊 ผลสรุปสมรรถนะการเรียนรู้รายทักษะ</div>
        ${analysisHTML}
      </div>
      
      <button class="btn btn-primary" onclick="location.reload()">🔄 รีเฟรชเพื่อสุ่มชุดคำถามและสลับช้อยส์ทำใหม่อีกครั้ง</button>
      ${reviewHTML}
    `;
  }
}

function selectAnswer(index) { if (state.checked[state.current]) return; state.answers[state.current] = index; renderApp(); }
function checkAnswer() { if (state.answers[state.current] === null) return; state.checked[state.current] = true; renderApp(); }
function goNext() { if (state.current < state.questions.length - 1) { state.current++; renderApp(); } }
function goPrev() { if (state.current > 0) { state.current--; renderApp(); } }
function jumpTo(index) { state.current = index; renderApp(); }
function showResult() { state.screen = 'result'; renderApp(); }

renderApp();
</script>
</body>
</html>
